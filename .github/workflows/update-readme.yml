name: Update README with latest repos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update README with repos
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "repos"
          feed_list: "https://github.com/abhijitpavse.atom"
          max_post_count: 5

      - name: Commit changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git add .
          git commit -m "Update README" || echo "No changes"
          git push
